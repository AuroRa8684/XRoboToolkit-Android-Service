name: Build And Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create debug keystore for CI signing
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -v \
            -storepass android \
            -keypass android \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease

      - name: Prepare release artifact
        run: |
          cp app/build/outputs/apk/release/app-release.apk XRoboToolkitAndroidService.apk
          ls -lah XRoboToolkitAndroidService.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: XRoboToolkitAndroidService
          path: XRoboToolkitAndroidService.apk

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: XRoboToolkitAndroidService.apk
